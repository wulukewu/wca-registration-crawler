name: WCA Runner Multiple (Dev)

on:
  workflow_dispatch:
    inputs:
      event_url:
        description: 'Registration Page URL'
        required: false
        default: 'https://cubing-tw.net/event'
      runner_count:
        description: 'Number of machines to open'
        required: false
        default: '5'

permissions:
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          count=${{ github.event.inputs.runner_count || 5 }}
          matrix=$(node -e "console.log(JSON.stringify(Array.from({length: $count}, (_, i) => i + 1)))")
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  wca-runner:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        id: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}:latest || echo "No image found"

      - name: Run Docker container
        run: |
          docker run --rm \
            -e EVENT_URL="${{ github.event.inputs.event_url || secrets.EVENT_URL || '' }}" \
            -e WCA_ID="${{ secrets.WCA_ID || '' }}" \
            -e BIRTHDAY_YEAR="${{ secrets.BIRTHDAY_YEAR || '' }}" \
            -e BIRTHDAY_MONTH="${{ secrets.BIRTHDAY_MONTH || '' }}" \
            -e BIRTHDAY_DAY="${{ secrets.BIRTHDAY_DAY || '' }}" \
            -e EMAIL="${{ secrets.EMAIL || '' }}" \
            -e PHONE="${{ secrets.PHONE || '' }}" \
            -e DISCORD_TOKEN="${{ secrets.DISCORD_TOKEN || '' }}" \
            -e DISCORD_GUILD_ID="${{ secrets.DISCORD_GUILD_ID || '' }}" \
            -e DISCORD_CHANNEL_ID="${{ secrets.DISCORD_CHANNEL_ID || '' }}" \
            -e NO_UI=false \
            ghcr.io/${{ github.repository }}:latest || echo "Some arguments might be missing"

      - name: Cancel other runners on success
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });